<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 1600 600">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="5" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <radialGradient id="glow" cx="0.2" cy="0.6" r="0.5">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="600" fill="#0b0b0b"/>
  <!-- Canvas texture rectangles -->
  <rect x="100" y="80" width="500" height="440" rx="12" fill="#141414" opacity="0.5"/>
  <rect x="700" y="60" width="400" height="480" rx="12" fill="#131313" opacity="0.35"/>
  <rect x="1200" y="100" width="350" height="400" rx="12" fill="#151515" opacity="0.3"/>
  <!-- Frame lines -->
  <rect x="120" y="100" width="460" height="400" rx="8" fill="none" stroke="#1e1e1e" stroke-width="2" opacity="0.5"/>
  <rect x="720" y="80" width="360" height="440" rx="8" fill="none" stroke="#1e1e1e" stroke-width="2" opacity="0.4"/>
  <!-- Warm glow -->
  <rect width="1600" height="600" fill="url(#glow)"/>
  <!-- Grain -->
  <rect width="1600" height="600" filter="url(#grain)" opacity="0.04"/>
</svg>
