<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 1600 600">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#0d0d0d" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="600" fill="#0c0c0c"/>
  <!-- Diagonal light rays -->
  <line x1="200" y1="0" x2="600" y2="600" stroke="#171717" stroke-width="120" opacity="0.3"/>
  <line x1="600" y1="0" x2="1000" y2="600" stroke="#141414" stroke-width="80" opacity="0.25"/>
  <line x1="1100" y1="0" x2="1500" y2="600" stroke="#161616" stroke-width="100" opacity="0.2"/>
  <!-- Accent dot cluster -->
  <circle cx="800" cy="300" r="180" fill="#f97316" opacity="0.04"/>
  <circle cx="750" cy="280" r="60" fill="#f97316" opacity="0.06"/>
  <!-- Warm glow -->
  <rect width="1600" height="600" fill="url(#glow)"/>
  <!-- Grain -->
  <rect width="1600" height="600" filter="url(#grain)" opacity="0.04"/>
</svg>
