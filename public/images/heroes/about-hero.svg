<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 1600 600">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <radialGradient id="glow" cx="0.7" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="600" fill="#0d0d0d"/>
  <!-- Concentric arcs suggesting heritage architecture -->
  <circle cx="800" cy="600" r="500" fill="none" stroke="#181818" stroke-width="2" opacity="0.5"/>
  <circle cx="800" cy="600" r="400" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.4"/>
  <circle cx="800" cy="600" r="300" fill="none" stroke="#1c1c1c" stroke-width="2" opacity="0.35"/>
  <circle cx="800" cy="600" r="200" fill="none" stroke="#1e1e1e" stroke-width="2" opacity="0.3"/>
  <!-- Warm glow -->
  <rect width="1600" height="600" fill="url(#glow)"/>
  <!-- Grain -->
  <rect width="1600" height="600" filter="url(#grain)" opacity="0.04"/>
</svg>
