<svg xmlns="http://www.w3.org/2000/svg" width="600" height="450" viewBox="0 0 600 450">
  <defs>
    <filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feBlend in="SourceGraphic" mode="multiply"/></filter>
  </defs>
  <rect width="600" height="450" fill="#d4b896"/>
  <rect width="600" height="450" opacity="0.15" filter="url(#g)"/>
  <!-- Portrait oval -->
  <ellipse cx="300" cy="200" rx="120" ry="150" fill="#c8a878" stroke="#a08060" stroke-width="1"/>
  <!-- Flaking at edges -->
  <g fill="#f0e6da" opacity="0.7">
    <rect x="0" y="0" width="50" height="80" rx="2"/>
    <rect x="15" y="75" width="40" height="60" rx="2"/>
    <rect x="0" y="130" width="30" height="50" rx="2"/>
    <rect x="550" y="20" width="50" height="70" rx="2"/>
    <rect x="540" y="85" width="60" height="55" rx="2"/>
    <rect x="560" y="135" width="40" height="45" rx="2"/>
    <rect x="0" y="350" width="45" height="60" rx="2"/>
    <rect x="555" y="370" width="45" height="50" rx="2"/>
  </g>
  <text x="300" y="430" font-family="system-ui, sans-serif" font-size="11" fill="#6a5338" text-anchor="middle" opacity="0.6">Portrait — edge flaking with paint loss</text>
</svg>
