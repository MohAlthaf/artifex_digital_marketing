<svg xmlns="http://www.w3.org/2000/svg" width="600" height="500" viewBox="0 0 600 500">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.4" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>
  <rect width="600" height="500" fill="#f0e6da"/>
  <rect width="600" height="500" fill="#e8ddd0" opacity="0.3" filter="url(#grain)"/>
  
  <!-- Step flow diagram -->
  <g font-family="system-ui, sans-serif">
    <!-- Step circles and labels -->
    <circle cx="100" cy="80" r="24" fill="#8b5e3c" opacity="0.9"/>
    <text x="100" y="86" font-size="14" font-weight="600" fill="white" text-anchor="middle">1</text>
    <text x="145" y="86" font-size="12" fill="#5c524a">Upload image</text>
    
    <line x1="100" y1="104" x2="100" y2="146" stroke="#c4956a" stroke-width="1.5" stroke-dasharray="4 3"/>
    
    <circle cx="100" cy="170" r="24" fill="#8b5e3c" opacity="0.9"/>
    <text x="100" y="176" font-size="14" font-weight="600" fill="white" text-anchor="middle">2</text>
    <text x="145" y="176" font-size="12" fill="#5c524a">Add damage mask</text>
    
    <line x1="100" y1="194" x2="100" y2="236" stroke="#c4956a" stroke-width="1.5" stroke-dasharray="4 3"/>
    
    <circle cx="100" cy="260" r="24" fill="#8b5e3c" opacity="0.9"/>
    <text x="100" y="266" font-size="14" font-weight="600" fill="white" text-anchor="middle">3</text>
    <text x="145" y="266" font-size="12" fill="#5c524a">Generate preview</text>
    
    <line x1="100" y1="284" x2="100" y2="326" stroke="#c4956a" stroke-width="1.5" stroke-dasharray="4 3"/>
    
    <circle cx="100" cy="350" r="24" fill="#8b5e3c" opacity="0.9"/>
    <text x="100" y="356" font-size="14" font-weight="600" fill="white" text-anchor="middle">4</text>
    <text x="145" y="356" font-size="12" fill="#5c524a">Review &amp; triage</text>
    
    <line x1="100" y1="374" x2="100" y2="416" stroke="#c4956a" stroke-width="1.5" stroke-dasharray="4 3"/>
    
    <circle cx="100" cy="440" r="24" fill="#8b5e3c" opacity="0.9"/>
    <text x="100" y="446" font-size="14" font-weight="600" fill="white" text-anchor="middle">5</text>
    <text x="145" y="446" font-size="12" fill="#5c524a">Export documentation</text>
  </g>
  
  <!-- Side artwork mock -->
  <rect x="340" y="100" width="220" height="300" rx="4" fill="#d4c4b0" stroke="#c4956a" stroke-width="1"/>
  <rect x="355" y="115" width="190" height="230" fill="#e8ddd0"/>
  <rect x="355" y="115" width="190" height="230" fill="#d4c4b0" opacity="0.2" filter="url(#grain)"/>
  <text x="450" y="240" font-family="Georgia, serif" font-size="11" fill="#8a7f76" text-anchor="middle">Artwork Preview</text>
  <text x="450" y="370" font-family="system-ui, sans-serif" font-size="10" fill="#8a7f76" text-anchor="middle">Brushstroke-aware output</text>
</svg>
