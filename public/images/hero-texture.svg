<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="600" viewBox="0 0 1920 600">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8ddd0"/>
      <stop offset="50%" stop-color="#d4c4b0"/>
      <stop offset="100%" stop-color="#c8b8a4"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="600" fill="url(#warm)"/>
  <rect width="1920" height="600" fill="#d4c4b0" opacity="0.3" filter="url(#grain)"/>
  <!-- Subtle brushstroke-like texture lines -->
  <g opacity="0.08" stroke="#8b5e3c" stroke-width="1">
    <line x1="0" y1="100" x2="1920" y2="90"/>
    <line x1="0" y1="200" x2="1920" y2="210"/>
    <line x1="0" y1="300" x2="1920" y2="295"/>
    <line x1="0" y1="400" x2="1920" y2="410"/>
    <line x1="0" y1="500" x2="1920" y2="495"/>
  </g>
</svg>
